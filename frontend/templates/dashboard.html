{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Your accounts</h3>
</div>

{% if accounts %}
<div class="row g-3">
  {% for acc in accounts %}
  <div class="col-md-4">
    <div class="card shadow-sm h-100">
      <div class="card-body">
        <h5 class="card-title">{{ acc.name }}</h5>
        <p class="text-muted small mb-2">{{ acc.iban }}</p>
        <p class="display-6 mb-3">€{{ "%.2f"|format(acc.balance) }}</p>
        <a class="btn btn-primary btn-sm" href="{{ url_for('account_detail', account_id=acc.id) }}">Open</a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% else %}
<p class="text-muted">You have no accounts yet.</p>
{% endif %}
{% endblock %}

{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title mb-3">Deposit</h4>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Amount (€)</label>
            <input class="form-control" name="amount" type="number" step="0.01" min="0.01" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <input class="form-control" name="description" placeholder="e.g. Salary">
          </div>
          <button class="btn btn-success" type="submit">Deposit</button>
          <a class="btn btn-link" href="{{ url_for('account_detail', account_id=account_id) }}">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title mb-3">Make a payment</h4>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Amount (€)</label>
            <input class="form-control" name="amount" type="number" step="0.01" min="0.01" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <input class="form-control" name="description" placeholder="e.g. Rent">
          </div>

          <div class="mb-3">
            <label class="form-label">Beneficiary type</label>
            <select class="form-select" name="beneficiary_type" id="beneficiary_type" onchange="toggleBeneficiary()">
              <option value="internal">Internal (another Gemini Bank account)</option>
              <option value="external">External (IBAN)</option>
            </select>
          </div>

          <div class="mb-3" id="internal_block">
            <label class="form-label">Internal account</label>
            <select class="form-select" name="internal_account_id">
              {% for a in internal_accounts %}
              <option value="{{ a.id }}">{{ a.owner }} — {{ a.name }} (#{{ a.id }})</option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3 d-none" id="external_block">
            <label class="form-label">Beneficiary IBAN</label>
            <input class="form-control mb-2" name="iban" placeholder="DE00 0000 0000 0000 0000 00">
            <label class="form-label">Beneficiary name</label>
            <input class="form-control" name="beneficiary_name" placeholder="e.g. ACME GmbH">
          </div>

          <button class="btn btn-primary" type="submit">Send payment</button>
          <a class="btn btn-link" href="{{ url_for('account_detail', account_id=account_id) }}">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
function toggleBeneficiary() {
  var t = document.getElementById('beneficiary_type').value;
  document.getElementById('internal_block').classList.toggle('d-none', t !== 'internal');
  document.getElementById('external_block').classList.toggle('d-none', t !== 'external');
}
toggleBeneficiary();
</script>
{% endblock %}
